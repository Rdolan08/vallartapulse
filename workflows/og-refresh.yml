name: Refresh OG Images

on:
  schedule:
    # Every other day at 09:00 UTC
    - cron: "0 9 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: og-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @workspace/scripts exec playwright install --with-deps chromium

      - name: Generate OG screenshots
        env:
          BASE_URL: https://www.vallartapulse.com
        run: pnpm --filter @workspace/scripts run og

      - name: Bump OG cache-buster (?v=YYYY-MM-DD) in index.html files
        run: |
          DATE=$(date -u +%Y-%m-%d)
          find artifacts/pv-datastore -name index.html -exec \
            sed -i -E "s|/og/([a-z-]+)\.png\?v=[0-9-]+|/og/\1.png?v=${DATE}|g" {} +

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/pv-datastore/public/og artifacts/pv-datastore/index.html artifacts/pv-datastore/*/index.html
          if git diff --cached --quiet; then
            echo "No changes - skipping commit."
          else
            git commit -m "chore(og): refresh social preview images [skip ci]"
            git push
          fi
