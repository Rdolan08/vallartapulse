kind = "web"
previewPath = "/"
title = "VallartaPulse"
version = "1.0.0"
id = "artifacts/pv-datastore"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24154

[services.development]
run = "pnpm --filter @workspace/pv-datastore run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pv-datastore", "run", "build" ]
publicDir = "artifacts/pv-datastore/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24154"
BASE_PATH = "/"
