name: PVRPV Calendar Scrape (daily)

# Runs scripts/src/calendar-scrape.ts directly against the prod DB to refresh
# the next-365-days pricing window for every active PVRPV listing
# (rental_prices_by_date). Same Pattern B rationale as pvrpv-scrape.yml:
# plain-HTTP source, no anti-bot wall, no need for the Railway proxy infra.
#
# Frequency: daily at 07:05 UTC — 5 minutes after pvrpv-scrape.yml so the
# listing rows the calendar joins against are guaranteed fresh first.
#
# Required GitHub repository secrets:
#   RAILWAY_DATABASE_URL   prod Postgres connection string (already used elsewhere)

on:
  schedule:
    - cron: "5 7 * * *"   # daily 07:05 UTC (5 min after pvrpv-scrape.yml)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pvrpv-calendar-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with: { fetch-depth: 1 }

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with: { version: 9 }

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run PVRPV + Vacation Vallarta calendar scraper against prod DB
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          PIPELINE_SUMMARY_OUT: /tmp/calendar-summary.json
        run: |
          set -uo pipefail
          set +e
          pnpm --filter @workspace/scripts run scrape:calendar
          SCRIPT_EXIT=$?
          set -e

          if [ ! -s /tmp/calendar-summary.json ]; then
            echo "::error title=Calendar scrape::No summary file produced (script exit=${SCRIPT_EXIT})"
            exit 1
          fi

          jq '.summary' /tmp/calendar-summary.json || true

          # Same pass/fail vocabulary as airbnb-pricing-refresh.yml.
          LEVEL=$(jq -r '.summary.alertLevel // "unknown"' /tmp/calendar-summary.json)
          REASON=$(jq -r '.summary.alertReason // ""' /tmp/calendar-summary.json)
          ATTEMPTED=$(jq -r '.summary.attempted // 0' /tmp/calendar-summary.json)
          OK=$(jq -r '.summary.ok // 0' /tmp/calendar-summary.json)
          FAILED=$(jq -r '.summary.failed // 0' /tmp/calendar-summary.json)
          ROWS=$(jq -r '.summary.rowsWritten // 0' /tmp/calendar-summary.json)

          {
            echo "## Calendar scrape (PVRPV + Vacation Vallarta)"
            echo ""
            echo "- Verdict: **${LEVEL}**${REASON:+ — ${REASON}}"
            echo "- Listings attempted: ${ATTEMPTED} (ok=${OK}, failed=${FAILED})"
            echo "- Rows written: ${ROWS}"
            echo ""
            echo "### Per-source"
            echo ""
            jq -r '.summary.perSource[] | "- **" + .source + "** — " + .alertLevel + (if .alertReason != "" then " — " + .alertReason else "" end) + " (attempted=" + (.attempted|tostring) + ", ok=" + (.ok|tostring) + ", failed=" + (.failed|tostring) + ", rows=" + (.rowsWritten|tostring) + ")"' /tmp/calendar-summary.json
          } >> "$GITHUB_STEP_SUMMARY"

          case "$LEVEL" in
            ok)
              echo "PASS — calendar scrape healthy (ok=$OK/$ATTEMPTED, rows=$ROWS)"
              ;;
            warn)
              echo "::warning title=Calendar scrape degraded::${REASON}"
              ;;
            fail)
              echo "::error title=Calendar scrape has gone dark::${REASON}"
              exit 1
              ;;
            *)
              echo "::warning title=Calendar scrape::summary.alertLevel missing"
              ;;
          esac
