name: Airbnb Calendar Scrape (daily)

# Runs scripts/src/airbnb-calendar-scrape.ts directly against the prod DB.
#
# Why GitHub Actions instead of an in-process scheduler:
#   - The /api/v2/homes_pdp_availability_calendar endpoint is plain HTTP,
#     no proxy required (verified April 2026 spike). Pattern B fits
#     naturally — same shape as pvrpv-scrape.yml.
#   - Keeps the scraper out of the API server's request loop entirely.
#
# What it produces:
#   One row per (Airbnb listing × calendar day) for the next 365 days,
#   UPSERTed into rental_prices_by_date. nightly_price_usd is null
#   (Airbnb's public calendar endpoint stripped per-day prices); the
#   useful signal is availability + min-nights, which feeds owner-facing
#   "comparable Airbnb listings X% booked" questions and lets the comp
#   model see Airbnb's demand curve. Full nightly-price quotes wait for
#   path 2 (PdpAvailabilityCalendar GraphQL replay) — see data-feeding.md.
#
# Frequency: daily at 07:10 UTC (10 minutes after PVRPV so we don't
# stampede the prod DB at the same instant).
#
# Required GitHub repository secrets:
#   RAILWAY_DATABASE_URL   prod Postgres connection string

on:
  # PAUSED 2026-04-27: this cron was nulling AirROI nightly_price_usd values
  # via the upsert at scripts/src/airbnb-calendar-scrape.ts (the calendar
  # endpoint never carries per-day prices, so EXCLUDED.nightly_price_usd
  # was always NULL and was overwriting good AirROI prices). The script's
  # upsert has been COALESCE-guarded so re-enabling is safe, but leave
  # disabled until manual confirmation that COALESCE behaves as expected.
  # To re-enable: uncomment the schedule block below.
  # schedule:
  #   - cron: "10 7 * * *"   # daily 07:10 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: airbnb-calendar-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with: { fetch-depth: 1 }

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with: { version: 9 }

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Airbnb calendar scraper against prod DB
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: pnpm --filter @workspace/scripts exec tsx src/airbnb-calendar-scrape.ts
