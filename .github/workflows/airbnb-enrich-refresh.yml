name: Airbnb Enrich + Daily Refresh

# Honors the freshness contract: "no stale data on the site, ever".
# Runs every day at 06:00 UTC (~midnight Vallarta) and:
#   1. Drains any newly-discovered Airbnb listings (mode=new, up to 500).
#   2. Re-fetches anything whose latest enrichment is >24h old (mode=stale,
#      up to 500). The endpoint orders ASCending by last_enriched, so the
#      most-stale rows always go first.
#
# All work executes on Railway via the existing /api/ingest/enrich-airbnb-detail
# endpoint — this workflow is purely a triggering mechanism. No proxy, no
# scraping, no DB credentials in GitHub.
#
# Required GitHub repository secrets:
#   RAILWAY_API_URL          e.g. https://api.vallartapulse.com  (no trailing slash)
#   INTERNAL_TRIGGER_TOKEN   same value as the Railway env var of the same name

on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Which cohort to enrich (default: both)"
        required: false
        default: "both"
        type: choice
        options: ["both", "new", "stale"]
      max_listings:
        description: "Cap per call. Default 10000 = process the entire cohort. Set lower only for manual smoke tests."
        required: false
        default: "10000"
      force_refresh:
        description: "Force re-enrich every listing regardless of last_enriched_at age (sets staleAfterDays=0). Off by default; the daily cron always uses the 24h threshold."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: airbnb-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Verify required secrets
        run: |
          : "${RAILWAY_API_URL:?RAILWAY_API_URL secret is missing}"
          : "${INTERNAL_TRIGGER_TOKEN:?INTERNAL_TRIGGER_TOKEN secret is missing}"
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
          INTERNAL_TRIGGER_TOKEN: ${{ secrets.INTERNAL_TRIGGER_TOKEN }}

      - name: Drain new listings (mode=new)
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'both' || inputs.mode == 'new' }}
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
          INTERNAL_TRIGGER_TOKEN: ${{ secrets.INTERNAL_TRIGGER_TOKEN }}
          MAX_LISTINGS: ${{ inputs.max_listings || '10000' }}
        run: |
          set -euo pipefail
          echo "POST $RAILWAY_API_URL/api/ingest/enrich-airbnb-detail  mode=new max=$MAX_LISTINGS"
          curl --fail-with-body --show-error --silent --max-time 5400 \
            -X POST "$RAILWAY_API_URL/api/ingest/enrich-airbnb-detail" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: $INTERNAL_TRIGGER_TOKEN" \
            -d "{\"mode\":\"new\",\"maxListings\":$MAX_LISTINGS}" \
            | tee /tmp/new.json
          echo ""
          # Endpoint nests counts under `.summary` with snake_case keys.
          jq '.summary' /tmp/new.json || true

      - name: Refresh stale listings (mode=stale)
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'both' || inputs.mode == 'stale' }}
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
          INTERNAL_TRIGGER_TOKEN: ${{ secrets.INTERNAL_TRIGGER_TOKEN }}
          MAX_LISTINGS: ${{ inputs.max_listings || '10000' }}
          # Scheduled runs always use the 24h threshold. Manual runs honor
          # the force_refresh checkbox: when ticked, every listing counts
          # as stale (staleAfterDays=0), so a single manual dispatch can
          # re-enrich the entire cohort without waiting out the 24h window.
          STALE_AFTER_DAYS: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_refresh == true) && '0' || '1' }}
        run: |
          set -euo pipefail
          echo "POST $RAILWAY_API_URL/api/ingest/enrich-airbnb-detail  mode=stale staleAfterDays=$STALE_AFTER_DAYS max=$MAX_LISTINGS"
          curl --fail-with-body --show-error --silent --max-time 5400 \
            -X POST "$RAILWAY_API_URL/api/ingest/enrich-airbnb-detail" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: $INTERNAL_TRIGGER_TOKEN" \
            -d "{\"mode\":\"stale\",\"staleAfterDays\":$STALE_AFTER_DAYS,\"maxListings\":$MAX_LISTINGS}" \
            | tee /tmp/stale.json
          echo ""
          jq '.summary' /tmp/stale.json || true
