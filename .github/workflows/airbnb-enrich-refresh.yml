name: Airbnb Enrich + Daily Refresh

# Honors the freshness contract: "no stale data on the site, ever".
# Runs every day at 06:00 UTC (~midnight Vallarta) and drains the unified
# Airbnb detail-enrichment priority queue in a single call:
#
#   P0  brand-new listings (no listing_details row ever) — same-day SLA
#   P1  stale (>24h) listings in Tier-1 pricing-tool buckets
#   P2  stale (>24h) listings in any other bucket
#   P3  parse_status='partial' rows older than 6h (self-healing retry)
#
# Listings whose discovery has not seen them in 14 days are excluded
# entirely. Cohort exclusion + ORDER BY priority guarantees that even if
# the workflow times out partway, the highest-value work always lands first.
#
# All execution happens on Railway via /api/ingest/enrich-airbnb-detail —
# this workflow is purely a triggering mechanism. No proxy, no scraping,
# no DB credentials in GitHub.
#
# Required GitHub repository secrets:
#   RAILWAY_API_URL          e.g. https://api.vallartapulse.com  (no trailing slash)
#   INTERNAL_TRIGGER_TOKEN   same value as the Railway env var of the same name

on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Which priority slice to admit. 'priority' (default) drains P0..P3 — the cron path. 'new' = P0 only. 'stale' = P1..P3 only."
        required: false
        default: "priority"
        type: choice
        options: ["priority", "new", "stale"]
      max_listings:
        description: "Cap per call. Default 10000 = process the entire cohort. Set lower only for manual smoke tests."
        required: false
        default: "10000"
      force_refresh:
        description: "Force re-enrich every listing regardless of last_enriched_at age (sets staleAfterDays=0). Off by default; the daily cron always uses the 24h threshold."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: airbnb-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Verify required secrets
        run: |
          : "${RAILWAY_API_URL:?RAILWAY_API_URL secret is missing}"
          : "${INTERNAL_TRIGGER_TOKEN:?INTERNAL_TRIGGER_TOKEN secret is missing}"
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
          INTERNAL_TRIGGER_TOKEN: ${{ secrets.INTERNAL_TRIGGER_TOKEN }}

      - name: Drain unified priority queue
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
          INTERNAL_TRIGGER_TOKEN: ${{ secrets.INTERNAL_TRIGGER_TOKEN }}
          # Scheduled runs always use the priority cohort (P0..P3). Manual
          # dispatch can narrow to 'new' (P0 only) or 'stale' (P1..P3) for
          # ad-hoc smoke tests.
          MODE: ${{ github.event_name == 'schedule' && 'priority' || inputs.mode }}
          MAX_LISTINGS: ${{ inputs.max_listings || '10000' }}
          # Scheduled runs always use the 24h staleness threshold. Manual
          # runs honor the force_refresh checkbox: when ticked, every
          # listing counts as stale (staleAfterDays=0), so a single manual
          # dispatch can re-enrich the entire cohort without waiting out
          # the 24h window.
          STALE_AFTER_DAYS: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_refresh == true) && '0' || '1' }}
        run: |
          set -euo pipefail
          echo "POST $RAILWAY_API_URL/api/ingest/enrich-airbnb-detail  mode=$MODE staleAfterDays=$STALE_AFTER_DAYS max=$MAX_LISTINGS"
          curl --fail-with-body --show-error --silent --max-time 5400 \
            -X POST "$RAILWAY_API_URL/api/ingest/enrich-airbnb-detail" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: $INTERNAL_TRIGGER_TOKEN" \
            -d "{\"mode\":\"$MODE\",\"staleAfterDays\":$STALE_AFTER_DAYS,\"maxListings\":$MAX_LISTINGS}" \
            | tee /tmp/enrich.json
          echo ""
          # Top-line outcome counts.
          jq '.summary | {attempted, enriched, parse_fail, blocked, error, delisted, mode, staleAfterDays}' /tmp/enrich.json || true
          # Per-priority-bucket drain rates — confirms P0/P1 always finished.
          jq '.summary.byPriority' /tmp/enrich.json || true

          # ── Job summary ──────────────────────────────────────────────
          {
            echo "## Airbnb enrichment — unified priority queue"
            echo ""
            echo '```json'
            jq '.summary | {attempted, enriched, parse_fail, blocked, error, delisted, mode, staleAfterDays, byPriority}' /tmp/enrich.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
