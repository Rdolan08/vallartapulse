name: Calendar Pricing Freshness Check (daily)

# Runs scripts/freshness.sh against the prod (Railway) database and fails
# the job if PVRPV or Vacation Vallarta calendar pricing in
# rental_prices_by_date has not refreshed within the configured threshold
# (default 36h, see CALENDAR_STALE_HOURS in scripts/freshness.sh).
#
# Why this exists: the calendar scrapers (pvrpv-scrape.yml, calendar-scrape.yml,
# airbnb-calendar-scrape.yml) all run between 07:00–07:10 UTC. Without this
# job, a silent scraper outage would leave dashboards serving stale prices
# for days before anyone noticed. On failure we open (or update) a GitHub
# issue so an operator gets paged.
#
# Frequency: daily at 08:00 UTC — ~50 min after the latest calendar scraper
# (07:10 UTC) so a same-morning failure is surfaced the same day.
#
# Required GitHub repository secrets:
#   RAILWAY_DATABASE_URL   prod Postgres connection string (already used elsewhere)

on:
  schedule:
    - cron: "0 8 * * *"   # daily 08:00 UTC, ~50min after calendar scrapers finish
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: freshness-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with: { fetch-depth: 1 }

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run freshness check against prod DB
        id: freshness
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          set -o pipefail
          ./scripts/freshness.sh prod 2>&1 | tee freshness-output.txt

      - name: Open GitHub issue on stale pricing
        if: failure() && steps.freshness.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              body = fs.readFileSync('freshness-output.txt', 'utf8');
            } catch (e) {
              body = '(freshness-output.txt missing — check job logs)';
            }
            // Trim to last ~6KB so the issue body stays readable.
            if (body.length > 6000) body = body.slice(-6000);

            const title = 'Calendar pricing freshness check failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Reuse a single open issue per failure type so we don't spam
            // operators with one issue per day during an outage.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'freshness-alert',
              per_page: 10,
            });

            const comment = [
              `Freshness check failed at ${new Date().toISOString()}.`,
              ``,
              `Workflow run: ${runUrl}`,
              ``,
              '```',
              body,
              '```',
            ].join('\n');

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: comment,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['freshness-alert'],
                body: [
                  'The scheduled calendar pricing freshness check is failing.',
                  'PVRPV and/or Vacation Vallarta pricing in `rental_prices_by_date`',
                  'has not refreshed within the configured threshold (default 36h).',
                  '',
                  'Investigate the upstream calendar scrapers:',
                  '- `.github/workflows/calendar-scrape.yml` (PVRPV + Vacation Vallarta)',
                  '- `.github/workflows/airbnb-calendar-scrape.yml` (Airbnb)',
                  '',
                  'Close this issue once a successful freshness run has occurred.',
                  '',
                  '---',
                  '',
                  comment,
                ].join('\n'),
              });
            }
