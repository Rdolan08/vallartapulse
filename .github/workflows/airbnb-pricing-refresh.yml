name: Airbnb Pricing Refresh

# ─────────────────────────────────────────────────────────────────────────
# RE-ENABLED 2026-04-23 — both GraphQL adapters shipped and the unavailable
# fast-path landed in 68475e8. Daily cron now active; the runner also
# triggers a post-scrape presumed_bookings inference step so we slowly
# build a transaction-rate (vs. asking-rate) dataset over time.
# ─────────────────────────────────────────────────────────────────────────

# Triggers the per-night Airbnb pricing pipeline ("path 2" in
# docs/data-feeding.md): the API server fetches each listing's
# PdpAvailabilityCalendar GraphQL response through the residential proxy,
# expands it into ~30–40 quote rows per listing via airbnb-checkpoints,
# and inserts them into listing_price_quotes.
#
# All work runs on Railway via /api/ingest/airbnb-pricing-refresh — the
# residential proxy URL and Playwright (used for the one-time persisted-
# query SHA discovery) live there, not in GitHub Actions.
#
# Schedule rationale:
#   - 09:00 UTC = 03:00 PV / 04:00 ET. Off-peak for Airbnb's frontend
#     traffic and for our residential proxy pool. Sits ~110 min after
#     airbnb-calendar-scrape.yml (07:10) so the availability feed has
#     fully drained before the pricing feed starts hammering the same
#     proxy egress. One run per night by design — keeps exposure low
#     and freshness comfortably inside the ≤7d full-credit band that
#     comps-pricing-source.ts uses for Rank 0 quote selection.
#
# Required GitHub repository secrets:
#   RAILWAY_API_URL          e.g. https://api.vallartapulse.com (no trailing slash)
#   INTERNAL_TRIGGER_TOKEN   same value as the Railway env var of the same name
#
# Optional GitHub repository secrets (push-alert delivery):
#   SLACK_WEBHOOK_URL        Slack incoming webhook for the ops channel. When
#                            set, a "Airbnb pricing dark" message is posted on
#                            fail. When unset, the Slack step is skipped and
#                            the GitHub-issue alert below is the only channel.
#
# Dedupe: a single GitHub issue labelled `airbnb-pricing-dark` is reused for
# the duration of an outage — first failure opens it, subsequent daily
# failures comment on it (matching the freshness-check.yml pattern). Because
# this workflow only runs once per day, that naturally satisfies the
# "re-alert only every 24h or when the situation changes" requirement.

on:
  schedule:
    - cron: "0 9 * * *"   # daily 09:00 UTC (= 03:00 PV / 04:00 ET)
  workflow_dispatch:
    inputs:
      max_listings:
        description: "Cap per call. Default 10000 = process the entire cohort (well above any plausible Airbnb listing count for years). Set lower only for manual smoke tests."
        required: false
        default: "10000"

permissions:
  contents: read
  issues: write   # so the on-fail notify step can open / comment on the dedupe issue

concurrency:
  group: airbnb-pricing-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Promoted to job-level so the Slack notify step's `if:` check on
    # env.SLACK_WEBHOOK_URL is evaluated deterministically. Step-level env
    # is not always visible at `if:` evaluation time.
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Verify required secrets
        run: |
          : "${RAILWAY_API_URL:?RAILWAY_API_URL secret is missing}"
          : "${INTERNAL_TRIGGER_TOKEN:?INTERNAL_TRIGGER_TOKEN secret is missing}"
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
          INTERNAL_TRIGGER_TOKEN: ${{ secrets.INTERNAL_TRIGGER_TOKEN }}

      - name: Refresh Airbnb pricing (stale-first)
        id: refresh
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
          INTERNAL_TRIGGER_TOKEN: ${{ secrets.INTERNAL_TRIGGER_TOKEN }}
          MAX_LISTINGS: ${{ inputs.max_listings || '10000' }}
        run: |
          set -euo pipefail
          echo "POST $RAILWAY_API_URL/api/ingest/airbnb-pricing-refresh max=$MAX_LISTINGS"
          curl --fail-with-body --show-error --silent --max-time 3000 \
            -X POST "$RAILWAY_API_URL/api/ingest/airbnb-pricing-refresh" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: $INTERNAL_TRIGGER_TOKEN" \
            -d "{\"maxListings\":$MAX_LISTINGS}" \
            | tee /tmp/pricing.json
          echo ""
          jq '.summary' /tmp/pricing.json || true

          # ── Pass/fail signal ────────────────────────────────────────
          # The runner returns summary.alertLevel ∈ {"ok","warn","fail"}.
          # We mirror that into the GH Actions step output (and a job
          # summary line) so the failure is loud — instead of silently
          # green when the API call succeeds but produces 0 quotes.
          # Response playbook lives at docs/playbooks/airbnb-pricing-dark.md.
          LEVEL=$(jq -r '.summary.alertLevel // "unknown"' /tmp/pricing.json)
          REASON=$(jq -r '.summary.alertReason // ""' /tmp/pricing.json)
          ATTEMPTED=$(jq -r '.summary.attempted // 0' /tmp/pricing.json)
          OK=$(jq -r '.summary.ok // 0' /tmp/pricing.json)
          QUOTES=$(jq -r '.summary.totalQuotesWritten // 0' /tmp/pricing.json)
          REDISCOVERIES=$(jq -r '.summary.shaRediscoveriesDuringRun // 0' /tmp/pricing.json)

          {
            echo "## Airbnb pricing refresh"
            echo ""
            echo "- Verdict: **${LEVEL}**${REASON:+ — ${REASON}}"
            echo "- Listings attempted: ${ATTEMPTED} (ok=${OK})"
            echo "- Quotes written: ${QUOTES}"
            echo "- SHA rediscoveries during run: ${REDISCOVERIES}"
            echo ""
            if [ "$LEVEL" = "fail" ]; then
              echo "**Response playbook:** docs/playbooks/airbnb-pricing-dark.md"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Stash the verdict for the notify steps below. We deliberately do
          # NOT `exit 1` here on fail — that would short-circuit the Slack /
          # GitHub-issue notify steps. Instead the final "Fail the job"
          # step at the bottom re-reads $LEVEL and exits non-zero so the run
          # still goes red on the Actions tab.
          {
            echo "level=${LEVEL}"
            # Slack/issue bodies need REASON on a single line; strip newlines.
            echo "reason=${REASON//$'\n'/ }"
            echo "attempted=${ATTEMPTED}"
            echo "ok=${OK}"
            echo "quotes=${QUOTES}"
            echo "rediscoveries=${REDISCOVERIES}"
          } >> "$GITHUB_OUTPUT"

          case "$LEVEL" in
            ok)
              echo "PASS — Airbnb pricing healthy (ok=$OK/$ATTEMPTED, quotes=$QUOTES)"
              ;;
            warn)
              echo "::warning title=Airbnb pricing degraded::${REASON}"
              ;;
            fail)
              echo "::error title=Airbnb pricing has gone dark::${REASON}"
              echo "See docs/playbooks/airbnb-pricing-dark.md"
              ;;
            *)
              echo "::warning title=Airbnb pricing::summary.alertLevel missing from response"
              ;;
          esac

      # ── Push notification: Slack ──────────────────────────────────────
      # Only runs on a `fail` verdict AND only if SLACK_WEBHOOK_URL is set,
      # so forks / dev repos without the secret stay quiet. Body links to
      # the playbook so the on-call has one click to triage.
      - name: Notify Slack on dark pricing
        # PAUSED — disabled while Airbnb pricing pipeline is on hold.
        # See replit.md ("Airbnb pricing pipeline — PAUSED"). Restore by
        # changing `if: false` back to the previous gate:
        #   if: steps.refresh.outputs.level == 'fail' && env.SLACK_WEBHOOK_URL != ''
        if: false
        env:
          REASON: ${{ steps.refresh.outputs.reason }}
          ATTEMPTED: ${{ steps.refresh.outputs.attempted }}
          OK_COUNT: ${{ steps.refresh.outputs.ok }}
          QUOTES: ${{ steps.refresh.outputs.quotes }}
          REDISCOVERIES: ${{ steps.refresh.outputs.rediscoveries }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PLAYBOOK_URL: ${{ github.server_url }}/${{ github.repository }}/blob/main/docs/playbooks/airbnb-pricing-dark.md
        run: |
          set -euo pipefail
          # Slack Block Kit payload — keeps the alert scannable in a busy
          # channel. jq builds the JSON so REASON is properly escaped.
          jq -n \
            --arg reason "$REASON" \
            --arg attempted "$ATTEMPTED" \
            --arg ok "$OK_COUNT" \
            --arg quotes "$QUOTES" \
            --arg rediscoveries "$REDISCOVERIES" \
            --arg run_url "$RUN_URL" \
            --arg playbook "$PLAYBOOK_URL" \
            '{
              text: ("Airbnb pricing has gone dark — " + $reason),
              blocks: [
                { type: "header",
                  text: { type: "plain_text", text: ":rotating_light: Airbnb pricing has gone dark" } },
                { type: "section",
                  text: { type: "mrkdwn",
                          text: ("*Reason:* " + $reason
                                 + "\n*Listings:* " + $ok + "/" + $attempted + " ok"
                                 + "  •  *Quotes written:* " + $quotes
                                 + "  •  *SHA rediscoveries:* " + $rediscoveries) } },
                { type: "actions",
                  elements: [
                    { type: "button",
                      text: { type: "plain_text", text: "Open playbook" },
                      url: $playbook },
                    { type: "button",
                      text: { type: "plain_text", text: "View workflow run" },
                      url: $run_url }
                  ] }
              ]
            }' > /tmp/slack.json
          curl --fail-with-body --show-error --silent --max-time 30 \
            -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data @/tmp/slack.json

      # ── Persistent dedupe: GitHub issue ───────────────────────────────
      # Mirrors the pattern in freshness-check.yml. One open issue labelled
      # `airbnb-pricing-dark` is reused for the duration of an outage:
      #   - first failing run opens it
      #   - subsequent failing runs comment on it (one comment per day)
      #   - operator closes it once data is flowing again
      # See follow-up task "Auto-close stale-pricing alerts once data is
      # flowing again" for automating that close step.
      - name: Open / update GitHub issue on dark pricing
        # PAUSED — disabled while Airbnb pricing pipeline is on hold.
        # See replit.md ("Airbnb pricing pipeline — PAUSED"). Restore by
        # changing `if: false` back to:
        #   if: steps.refresh.outputs.level == 'fail'
        if: false
        uses: actions/github-script@v7
        env:
          REASON: ${{ steps.refresh.outputs.reason }}
          ATTEMPTED: ${{ steps.refresh.outputs.attempted }}
          OK_COUNT: ${{ steps.refresh.outputs.ok }}
          QUOTES: ${{ steps.refresh.outputs.quotes }}
          REDISCOVERIES: ${{ steps.refresh.outputs.rediscoveries }}
        with:
          script: |
            const reason = process.env.REASON || '(no reason reported)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const playbookUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/main/docs/playbooks/airbnb-pricing-dark.md`;

            const stats = [
              `- Reason: **${reason}**`,
              `- Listings: ${process.env.OK_COUNT}/${process.env.ATTEMPTED} ok`,
              `- Quotes written: ${process.env.QUOTES}`,
              `- SHA rediscoveries during run: ${process.env.REDISCOVERIES}`,
              `- Workflow run: ${runUrl}`,
              `- Playbook: ${playbookUrl}`,
            ].join('\n');

            const comment = [
              `Airbnb pricing refresh failed at ${new Date().toISOString()}.`,
              ``,
              stats,
            ].join('\n');

            // Reuse a single open issue per failure type so we don't spam
            // operators with one new issue per day during a multi-day outage.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'airbnb-pricing-dark',
              per_page: 10,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: comment,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Airbnb pricing has gone dark',
                labels: ['airbnb-pricing-dark'],
                body: [
                  'The daily Airbnb pricing refresh is failing. The dashboard',
                  'card on `/sources` and the `/api/ingest/airbnb-pricing-freshness`',
                  'endpoint should both be RED.',
                  '',
                  'Follow the response playbook:',
                  playbookUrl,
                  '',
                  'Close this issue once a successful refresh has occurred.',
                  '',
                  '---',
                  '',
                  comment,
                ].join('\n'),
              });
            }

      # ── Final gate ────────────────────────────────────────────────────
      # Now that the notify steps have run, fail the job loudly so the
      # Actions tab shows red and any cross-workflow gating still works.
      - name: Fail the job on dark pricing
        if: steps.refresh.outputs.level == 'fail'
        run: |
          echo "Airbnb pricing dark — failing job after notifications were sent."
          exit 1
