name: VRBO Scrape (PAUSED)

# ─────────────────────────────────────────────────────────────────────────
# PAUSED 2026-04-19 — VRBO listing discovery is on hold.
#
# The Decodo residential proxy has not been able to defeat VRBO's "Bot or
# Not?" challenge: every daily run discovered 0 listings, so the cohort
# of rental_listings rows with source_platform='vrbo' has stayed empty.
# vrbo-pricing-refresh.yml is also paused as a downstream consequence.
#
# What is disabled here:
#   - The daily cron schedule (commented out below).
#   - The Slack push notification on `fail`.
#   - The GitHub-issue dedupe creation/comment on `fail`.
# What is intentionally NOT disabled:
#   - workflow_dispatch — kept available for manual smoke-testing once a
#     working anti-bot strategy lands. Triggering it today will exit 1
#     because every fetch hits the 429 challenge; that is expected and
#     only happens on explicit manual dispatch.
#   - The script itself — stays in place and will succeed the moment the
#     proxy strategy works.
# ─────────────────────────────────────────────────────────────────────────

# Runs scripts/src/vrbo-scrape.ts directly against the prod DB. Each run:
#   1. Discovers VRBO listings from the Puerto Vallarta search-results
#      pages via vrbo-search-adapter.discoverVrboListings(), routed
#      through PROXY_URL (Decodo residential) — VRBO returns a
#      "Bot or Not?" 429 challenge to datacenter IPs.
#   2. Loads every existing rental_listings row with source_platform='vrbo'.
#   3. Refreshes the union (discovered ∪ existing) capped at 200/run,
#      upserting on (source_platform, source_url) — same code path inserts
#      new and updates existing.
#
# Honors the freshness contract: every URL on the site gets re-fetched daily.
#
# Frequency: daily at 07:15 UTC. Sandwiched between pvrpv-scrape (07:00)
# and sources-sync-refresh (07:30) so we don't stampede the DB.
#
# Required GitHub repository secrets:
#   RAILWAY_DATABASE_URL   prod Postgres connection string
#   PROXY_URL              Decodo residential proxy URL (same as Railway env)
#
# Optional GitHub repository secrets (push-alert delivery):
#   SLACK_WEBHOOK_URL      Slack incoming webhook for the ops channel. When
#                          set, a "VRBO scrape dark" message is posted on
#                          fail. When unset, the Slack step is skipped and
#                          the GitHub-issue alert below is the only channel.
#
# Dedupe: a single GitHub issue labelled `vrbo-scrape-dark` is reused for
# the duration of an outage — first failure opens it, subsequent daily
# failures comment on it (matching the airbnb-pricing-refresh.yml pattern).
# Because this workflow only runs once per day, that naturally satisfies the
# "re-alert only every 24h or when the situation changes" requirement.

on:
  # PAUSED — daily cron disabled until VRBO discovery is unblocked.
  # Re-enable by uncommenting the schedule block below.
  # schedule:
  #   - cron: "15 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # so the on-fail notify step can open / comment on the dedupe issue

concurrency:
  group: vrbo-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Promoted to job-level so the Slack notify step's `if:` check on
    # env.SLACK_WEBHOOK_URL is evaluated deterministically.
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with: { fetch-depth: 1 }

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with: { version: 9 }

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @workspace/scripts exec playwright install --with-deps chromium

      - name: Run VRBO discovery + refresh against prod DB
        id: scrape
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          PROXY_URL:    ${{ secrets.PROXY_URL }}
          PIPELINE_SUMMARY_OUT: /tmp/vrbo-summary.json
        run: |
          set -uo pipefail
          # Don't fail the step on non-zero exit yet — we want to read the
          # summary file and emit the structured pass/fail signal first.
          set +e
          pnpm --filter @workspace/scripts exec tsx src/vrbo-scrape.ts
          SCRIPT_EXIT=$?
          set -e

          if [ ! -s /tmp/vrbo-summary.json ]; then
            echo "::error title=VRBO scrape::No summary file produced (script exit=${SCRIPT_EXIT})"
            # Synthesize a fail verdict so the Slack / GH-issue notify steps
            # below still fire — a missing summary file IS the outage signal.
            {
              echo "level=fail"
              echo "reason=No PIPELINE_SUMMARY_OUT produced (script exit=${SCRIPT_EXIT})"
              echo "attempted=0"
              echo "ok=0"
              echo "failed=0"
              echo "discovered=0"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          jq '.summary' /tmp/vrbo-summary.json || true

          # Same pass/fail vocabulary as airbnb-pricing-refresh.yml so the
          # GitHub Actions verdict is consistent across all pricing pipelines.
          LEVEL=$(jq -r '.summary.alertLevel // "unknown"' /tmp/vrbo-summary.json)
          REASON=$(jq -r '.summary.alertReason // ""' /tmp/vrbo-summary.json)
          ATTEMPTED=$(jq -r '.summary.attempted // 0' /tmp/vrbo-summary.json)
          OK=$(jq -r '.summary.ok // 0' /tmp/vrbo-summary.json)
          FAILED=$(jq -r '.summary.failed // 0' /tmp/vrbo-summary.json)
          DISCOVERED=$(jq -r '.summary.discovered // 0' /tmp/vrbo-summary.json)

          {
            echo "## VRBO scrape"
            echo ""
            echo "- Verdict: **${LEVEL}**${REASON:+ — ${REASON}}"
            echo "- URLs discovered: ${DISCOVERED}"
            echo "- Listings attempted: ${ATTEMPTED} (ok=${OK}, failed=${FAILED})"
          } >> "$GITHUB_STEP_SUMMARY"

          # Stash the verdict for the notify steps below. We deliberately do
          # NOT `exit 1` here on fail — that would short-circuit the Slack /
          # GitHub-issue notify steps. The final "Fail the job" step at the
          # bottom re-reads $LEVEL and exits non-zero so the run still goes
          # red on the Actions tab.
          {
            echo "level=${LEVEL}"
            # Slack/issue bodies need REASON on a single line; strip newlines.
            echo "reason=${REASON//$'\n'/ }"
            echo "attempted=${ATTEMPTED}"
            echo "ok=${OK}"
            echo "failed=${FAILED}"
            echo "discovered=${DISCOVERED}"
          } >> "$GITHUB_OUTPUT"

          case "$LEVEL" in
            ok)
              echo "PASS — VRBO scrape healthy (ok=$OK/$ATTEMPTED)"
              ;;
            warn)
              echo "::warning title=VRBO scrape degraded::${REASON}"
              ;;
            fail)
              echo "::error title=VRBO scrape has gone dark::${REASON}"
              ;;
            *)
              echo "::warning title=VRBO scrape::summary.alertLevel missing"
              ;;
          esac

      # ── Push notification: Slack ──────────────────────────────────────
      # Only runs on a `fail` verdict AND only if SLACK_WEBHOOK_URL is set,
      # so forks / dev repos without the secret stay quiet.
      - name: Notify Slack on dark scrape
        # PAUSED — VRBO scrape is intentionally dark. Re-enable by changing
        # `if: false` back to:
        #   if: steps.scrape.outputs.level == 'fail' && env.SLACK_WEBHOOK_URL != ''
        if: false
        env:
          REASON: ${{ steps.scrape.outputs.reason }}
          ATTEMPTED: ${{ steps.scrape.outputs.attempted }}
          OK_COUNT: ${{ steps.scrape.outputs.ok }}
          FAILED_COUNT: ${{ steps.scrape.outputs.failed }}
          DISCOVERED: ${{ steps.scrape.outputs.discovered }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          jq -n \
            --arg reason "$REASON" \
            --arg attempted "$ATTEMPTED" \
            --arg ok "$OK_COUNT" \
            --arg failed "$FAILED_COUNT" \
            --arg discovered "$DISCOVERED" \
            --arg run_url "$RUN_URL" \
            '{
              text: ("VRBO scrape has gone dark — " + $reason),
              blocks: [
                { type: "header",
                  text: { type: "plain_text", text: ":rotating_light: VRBO scrape has gone dark" } },
                { type: "section",
                  text: { type: "mrkdwn",
                          text: ("*Reason:* " + $reason
                                 + "\n*URLs discovered:* " + $discovered
                                 + "  •  *Listings:* " + $ok + "/" + $attempted + " ok"
                                 + "  •  *Failed:* " + $failed) } },
                { type: "actions",
                  elements: [
                    { type: "button",
                      text: { type: "plain_text", text: "View workflow run" },
                      url: $run_url }
                  ] }
              ]
            }' > /tmp/slack.json
          curl --fail-with-body --show-error --silent --max-time 30 \
            -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data @/tmp/slack.json

      # ── Persistent dedupe: GitHub issue ───────────────────────────────
      # One open issue labelled `vrbo-scrape-dark` is reused for the
      # duration of an outage — first failing run opens it, subsequent
      # failing runs comment on it (one comment per day), operator closes
      # it once data is flowing again.
      - name: Open / update GitHub issue on dark scrape
        # PAUSED — VRBO scrape is intentionally dark. Re-enable by changing
        # `if: false` back to:
        #   if: steps.scrape.outputs.level == 'fail'
        if: false
        uses: actions/github-script@v7
        env:
          REASON: ${{ steps.scrape.outputs.reason }}
          ATTEMPTED: ${{ steps.scrape.outputs.attempted }}
          OK_COUNT: ${{ steps.scrape.outputs.ok }}
          FAILED_COUNT: ${{ steps.scrape.outputs.failed }}
          DISCOVERED: ${{ steps.scrape.outputs.discovered }}
        with:
          script: |
            const reason = process.env.REASON || '(no reason reported)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const stats = [
              `- Reason: **${reason}**`,
              `- URLs discovered: ${process.env.DISCOVERED}`,
              `- Listings: ${process.env.OK_COUNT}/${process.env.ATTEMPTED} ok (failed=${process.env.FAILED_COUNT})`,
              `- Workflow run: ${runUrl}`,
            ].join('\n');

            const comment = [
              `VRBO scrape failed at ${new Date().toISOString()}.`,
              ``,
              stats,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'vrbo-scrape-dark',
              per_page: 10,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: comment,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'VRBO scrape has gone dark',
                labels: ['vrbo-scrape-dark'],
                body: [
                  'The daily VRBO scrape is failing. The dashboard card on',
                  '`/sources` should be RED for the VRBO source.',
                  '',
                  'Common causes: residential proxy outage, VRBO bot challenge',
                  'changes, or DOM changes in the search-results / listing pages.',
                  'Start by checking the workflow run logs.',
                  '',
                  'Close this issue once a successful scrape has occurred.',
                  '',
                  '---',
                  '',
                  comment,
                ].join('\n'),
              });
            }

      # ── Final gate ────────────────────────────────────────────────────
      # Now that the notify steps have run, fail the job loudly so the
      # Actions tab shows red and any cross-workflow gating still works.
      - name: Fail the job on dark scrape
        if: steps.scrape.outputs.level == 'fail'
        run: |
          echo "VRBO scrape dark — failing job after notifications were sent."
          exit 1
