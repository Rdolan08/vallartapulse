name: VRBO Scrape (daily)

# Runs scripts/src/vrbo-scrape.ts directly against the prod DB. This is a
# REFRESH-ONLY driver: it re-fetches every existing rental_listings row
# whose source_platform='vrbo' and source_url IS NOT NULL, and upserts the
# fresh data back. There is intentionally no discovery layer wired here yet —
# building one is a separate piece of work tracked in
# docs/data-feeding.md → "Out of scope" section.
#
# That means today this workflow is a no-op (zero VRBO rows in prod), but the
# plumbing is in place: the moment a VRBO seed row lands in the table, the
# next daily run picks it up and starts refreshing it. This honors the
# "no stale data, ever" contract from day one of seed availability — without
# silently swallowing the gap, since the run logs will say "Found 0 rows".
#
# Frequency: daily at 07:15 UTC. Sandwiched between pvrpv-scrape (07:00)
# and sources-sync-refresh (07:30) so we don't stampede the DB.
#
# Required GitHub repository secrets:
#   RAILWAY_DATABASE_URL   prod Postgres connection string

on:
  schedule:
    - cron: "15 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vrbo-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with: { fetch-depth: 1 }

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with: { version: 9 }

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run VRBO refresher against prod DB
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: pnpm --filter @workspace/scripts exec tsx src/vrbo-scrape.ts
