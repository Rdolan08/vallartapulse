name: VRBO Scrape (daily)

# Runs scripts/src/vrbo-scrape.ts directly against the prod DB. Each run:
#   1. Discovers VRBO listings from the Puerto Vallarta search-results
#      pages via vrbo-search-adapter.discoverVrboListings(), routed
#      through PROXY_URL (Decodo residential) — VRBO returns a
#      "Bot or Not?" 429 challenge to datacenter IPs.
#   2. Loads every existing rental_listings row with source_platform='vrbo'.
#   3. Refreshes the union (discovered ∪ existing) capped at 200/run,
#      upserting on (source_platform, source_url) — same code path inserts
#      new and updates existing.
#
# Honors the freshness contract: every URL on the site gets re-fetched daily.
#
# Frequency: daily at 07:15 UTC. Sandwiched between pvrpv-scrape (07:00)
# and sources-sync-refresh (07:30) so we don't stampede the DB.
#
# Required GitHub repository secrets:
#   RAILWAY_DATABASE_URL   prod Postgres connection string
#   PROXY_URL              Decodo residential proxy URL (same as Railway env)

on:
  schedule:
    - cron: "15 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vrbo-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with: { fetch-depth: 1 }

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with: { version: 9 }

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @workspace/scripts exec playwright install --with-deps chromium

      - name: Run VRBO discovery + refresh against prod DB
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          PROXY_URL:    ${{ secrets.PROXY_URL }}
          PIPELINE_SUMMARY_OUT: /tmp/vrbo-summary.json
        run: |
          set -uo pipefail
          # Don't fail the step on non-zero exit yet — we want to read the
          # summary file and emit the structured pass/fail signal first.
          set +e
          pnpm --filter @workspace/scripts exec tsx src/vrbo-scrape.ts
          SCRIPT_EXIT=$?
          set -e

          if [ ! -s /tmp/vrbo-summary.json ]; then
            echo "::error title=VRBO scrape::No summary file produced (script exit=${SCRIPT_EXIT})"
            exit 1
          fi

          jq '.summary' /tmp/vrbo-summary.json || true

          # Same pass/fail vocabulary as airbnb-pricing-refresh.yml so the
          # GitHub Actions verdict is consistent across all pricing pipelines.
          LEVEL=$(jq -r '.summary.alertLevel // "unknown"' /tmp/vrbo-summary.json)
          REASON=$(jq -r '.summary.alertReason // ""' /tmp/vrbo-summary.json)
          ATTEMPTED=$(jq -r '.summary.attempted // 0' /tmp/vrbo-summary.json)
          OK=$(jq -r '.summary.ok // 0' /tmp/vrbo-summary.json)
          FAILED=$(jq -r '.summary.failed // 0' /tmp/vrbo-summary.json)
          DISCOVERED=$(jq -r '.summary.discovered // 0' /tmp/vrbo-summary.json)

          {
            echo "## VRBO scrape"
            echo ""
            echo "- Verdict: **${LEVEL}**${REASON:+ — ${REASON}}"
            echo "- URLs discovered: ${DISCOVERED}"
            echo "- Listings attempted: ${ATTEMPTED} (ok=${OK}, failed=${FAILED})"
          } >> "$GITHUB_STEP_SUMMARY"

          case "$LEVEL" in
            ok)
              echo "PASS — VRBO scrape healthy (ok=$OK/$ATTEMPTED)"
              ;;
            warn)
              echo "::warning title=VRBO scrape degraded::${REASON}"
              ;;
            fail)
              echo "::error title=VRBO scrape has gone dark::${REASON}"
              exit 1
              ;;
            *)
              echo "::warning title=VRBO scrape::summary.alertLevel missing"
              ;;
          esac
