name: PVRPV Pricing Refresh (daily)

# Triggers the daily PVRPV per-night pricing pipeline. The API server
# fetches each listing's public calendar (no proxy required), expands it
# into ~30-40 quote rows per listing via the shared airbnb-checkpoints
# generator, and inserts them into listing_price_quotes — populating the
# cleaning / service / taxes / total columns the comp-comparison view
# needs so PVRPV listings stop rendering "—" alongside Airbnb comps.
#
# Schedule: 07:25 UTC, 5 minutes after airbnb-pricing-refresh (07:20) so
# the calendar / pricing pipelines stagger their DB load instead of
# stampeding it.
#
# Required GitHub repository secrets:
#   RAILWAY_API_URL          e.g. https://api.vallartapulse.com
#   INTERNAL_TRIGGER_TOKEN   same value as the Railway env var

on:
  schedule:
    - cron: "25 7 * * *"
  workflow_dispatch:
    inputs:
      max_listings:
        description: "Cap per call (1-500). Default 50."
        required: false
        default: "50"

permissions:
  contents: read

concurrency:
  group: pvrpv-pricing-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Verify required secrets
        run: |
          : "${RAILWAY_API_URL:?RAILWAY_API_URL secret is missing}"
          : "${INTERNAL_TRIGGER_TOKEN:?INTERNAL_TRIGGER_TOKEN secret is missing}"
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
          INTERNAL_TRIGGER_TOKEN: ${{ secrets.INTERNAL_TRIGGER_TOKEN }}

      - name: Refresh PVRPV pricing (stale-first)
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
          INTERNAL_TRIGGER_TOKEN: ${{ secrets.INTERNAL_TRIGGER_TOKEN }}
          MAX_LISTINGS: ${{ inputs.max_listings || '50' }}
        run: |
          set -euo pipefail
          echo "POST $RAILWAY_API_URL/api/ingest/pvrpv-pricing-refresh max=$MAX_LISTINGS"
          curl --fail-with-body --show-error --silent --max-time 1800 \
            -X POST "$RAILWAY_API_URL/api/ingest/pvrpv-pricing-refresh" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: $INTERNAL_TRIGGER_TOKEN" \
            -d "{\"maxListings\":$MAX_LISTINGS}" \
            | tee /tmp/pricing.json
          echo ""
          jq '.summary' /tmp/pricing.json || true

          LEVEL=$(jq -r '.summary.alertLevel // "unknown"' /tmp/pricing.json)
          REASON=$(jq -r '.summary.alertReason // ""' /tmp/pricing.json)
          ATTEMPTED=$(jq -r '.summary.attempted // 0' /tmp/pricing.json)
          OK=$(jq -r '.summary.ok // 0' /tmp/pricing.json)
          QUOTES=$(jq -r '.summary.totalQuotesWritten // 0' /tmp/pricing.json)

          {
            echo "## PVRPV pricing refresh"
            echo ""
            echo "- Verdict: **${LEVEL}**${REASON:+ — ${REASON}}"
            echo "- Listings attempted: ${ATTEMPTED} (ok=${OK})"
            echo "- Quotes written: ${QUOTES}"
          } >> "$GITHUB_STEP_SUMMARY"

          case "$LEVEL" in
            ok)   echo "PASS — PVRPV pricing healthy (ok=$OK/$ATTEMPTED, quotes=$QUOTES)" ;;
            warn) echo "::warning title=PVRPV pricing degraded::${REASON}" ;;
            fail) echo "::error title=PVRPV pricing has gone dark::${REASON}"; exit 1 ;;
            *)    echo "::warning title=PVRPV pricing::summary.alertLevel missing from response" ;;
          esac
