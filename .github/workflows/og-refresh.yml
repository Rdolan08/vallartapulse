name: Refresh OG Images

on:
  schedule:
    # Every Monday at 07:00 UTC (gives the site time to warm up after weekend)
    - cron: "0 7 * * 1"
  workflow_dispatch:
    # Also allow manual runs from the GitHub Actions tab

permissions:
  contents: write

jobs:
  capture:
    name: Screenshot & commit OG images
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @workspace/scripts exec playwright install chromium --with-deps

      - name: Generate OG screenshots
        env:
          BASE_URL: https://www.vallartapulse.com
        run: pnpm --filter @workspace/scripts run og
        continue-on-error: false

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet artifacts/pv-datastore/public/og/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push OG images
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git add artifacts/pv-datastore/public/og/
          git commit -m "chore: refresh OG preview images [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
